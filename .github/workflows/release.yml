name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.0"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  package:
    name: Package unsigned release
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore ClassicPhotoViewer.slnx

      - name: Build
        run: dotnet build ClassicPhotoViewer.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test ClassicPhotoViewer.slnx --configuration Release --no-build

      - name: Package
        shell: pwsh
        run: ./scripts/build-installer.ps1 -Version "${{ steps.version.outputs.version }}" -Configuration Release -NoRestore

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mangosteen-${{ steps.version.outputs.version }}-unsigned
          path: dist/*
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          prerelease: true
          body: |
            Unsigned preview release of Mangosteen Image Viewer.

            Download `SHA256SUMS.txt` and verify files before running them. Windows SmartScreen may warn until the project has code signing in place.
