name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.0"
        required: true
        default: "0.1.0"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Package unsigned release
    runs-on: windows-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      make_latest: ${{ steps.version.outputs.make_latest }}

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          function Get-NextStableVersion {
            $stableVersions = @()
            foreach ($tag in (git tag --list "v*.*.*")) {
              if ($tag -match '^v(?<version>(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*))$') {
                $stableVersions += [Version]$Matches['version']
              }
            }

            if ($stableVersions.Count -eq 0) {
              return "0.1.0"
            }

            $latest = $stableVersions | Sort-Object -Descending | Select-Object -First 1
            return "$($latest.Major).$($latest.Minor).$($latest.Build + 1)"
          }

          $version = "${{ github.event.inputs.version }}"
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          }
          elseif ([string]::IsNullOrWhiteSpace($version)) {
            $version = Get-NextStableVersion
          }

          $pattern = '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(-[0-9A-Za-z]+(\.[0-9A-Za-z]+)*)?$'
          if ($version -notmatch $pattern) {
            throw "Release version '$version' must be SemVer like 0.1.0 or 0.1.0-preview.1."
          }

          if ("${{ github.ref_type }}" -eq "tag" -and "${{ github.ref_name }}" -ne "v$version") {
            throw "Tag '${{ github.ref_name }}' must match resolved version 'v$version'."
          }

          $isPrerelease = $version.Contains("-").ToString().ToLowerInvariant()
          $makeLatest = if ($version.Contains("-")) { "false" } else { "true" }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT
          "is_prerelease=$isPrerelease" >> $env:GITHUB_OUTPUT
          "make_latest=$makeLatest" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore Mangosteen.slnx --locked-mode

      - name: Restore package runtime
        run: dotnet restore .\src\Mangosteen\Mangosteen.csproj --runtime win-x64 --locked-mode

      - name: Build
        run: dotnet build Mangosteen.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Mangosteen.slnx --configuration Release --no-build

      - name: Package
        shell: pwsh
        run: ./scripts/build-installer.ps1 -Version "${{ steps.version.outputs.version }}" -Configuration Release -NoRestore

      - name: Smoke-test installer
        shell: pwsh
        run: |
          ./scripts/test-installer.ps1 `
            -InstallerPath "dist\Mangosteen-Setup-${{ steps.version.outputs.version }}-x64.exe" `
            -InstallDirectory (Join-Path $env:RUNNER_TEMP "MangosteenInstallerSmoke") `
            -AllowedRoot $env:RUNNER_TEMP

      - name: Write release notes
        shell: pwsh
        run: ./scripts/new-release-notes.ps1 -Version "${{ steps.version.outputs.version }}" -Tag "${{ steps.version.outputs.tag }}" -Repository "${{ github.repository }}" -OutputPath "dist\RELEASE_NOTES.md"

      - name: Verify checksums
        shell: pwsh
        run: |
          $checksumPath = "dist\SHA256SUMS.txt"
          if (-not (Test-Path -LiteralPath $checksumPath)) {
            throw "Missing checksum file: $checksumPath"
          }

          $lines = Get-Content -LiteralPath $checksumPath | Where-Object { -not [string]::IsNullOrWhiteSpace($_) }
          if ($lines.Count -eq 0) {
            throw "Checksum file is empty."
          }

          foreach ($line in $lines) {
            if ($line -notmatch '^([a-f0-9]{64})  ([^\\/]+)$') {
              throw "Invalid checksum line: $line"
            }

            $expectedHash = $Matches[1]
            $fileName = $Matches[2]
            $filePath = Join-Path "dist" $fileName
            if (-not (Test-Path -LiteralPath $filePath)) {
              throw "Checksum references missing file: $fileName"
            }

            $actualHash = (Get-FileHash -LiteralPath $filePath -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($actualHash -ne $expectedHash) {
              throw "Checksum mismatch for $fileName."
            }
          }

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mangosteen-${{ steps.version.outputs.version }}-unsigned
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs: package
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: mangosteen-${{ needs.package.outputs.version }}-unsigned
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          name: Mangosteen ${{ needs.package.outputs.version }}
          tag_name: ${{ needs.package.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/Mangosteen-Setup-${{ needs.package.outputs.version }}-x64.exe
            dist/Mangosteen-Portable-${{ needs.package.outputs.version }}-x64.zip
            dist/SHA256SUMS.txt
          fail_on_unmatched_files: true
          preserve_order: true
          body_path: dist/RELEASE_NOTES.md
          generate_release_notes: false
          prerelease: ${{ needs.package.outputs.is_prerelease }}
          make_latest: ${{ needs.package.outputs.make_latest }}
