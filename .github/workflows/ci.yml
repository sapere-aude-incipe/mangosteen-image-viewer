name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Mangosteen.slnx --locked-mode

      - name: Build
        run: dotnet build Mangosteen.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Mangosteen.slnx --configuration Release --no-build --collect:"Code Coverage;Format=cobertura" --results-directory TestResults

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mangosteen-coverage-${{ github.run_id }}
          path: TestResults/**/*.cobertura.xml
          if-no-files-found: error
